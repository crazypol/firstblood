name: Daily Fetch

on:
  schedule:
    # Run daily at UTC 00:30 (after GitHub Trending updates)
    - cron: '30 0 * * *'
  workflow_dispatch:  # Manual trigger
    inputs:
      since:
        description: 'Time range'
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
      with_ai:
        description: 'Generate AI summaries'
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          AI_TREND_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_TREND_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE="${{ inputs.since || 'daily' }}"
          AI_FLAG=""
          if [[ "${{ inputs.with_ai }}" == "true" ]] || [[ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]]; then
            AI_FLAG="--ai"
          fi
          python -m src.pipeline --since "$SINCE" $AI_FLAG --api

      - name: Commit and push data
        run: |
          git config user.name "AI Trend Bot"
          git config user.email "bot@ai-trend-daily"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git push
